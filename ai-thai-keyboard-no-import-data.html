    <!-- 引入 Tailwind CSS 以進行快速美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 從 Google Fonts 引入四種泰文字體 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&family=Sarabun:wght@400;500;700&family=Mitr:wght@400;500&family=Chonburi&display=swap');
        
        /* 預設字體 */
        body {
            transition: font-family 0.3s ease-in-out;
            touch-action: manipulation;
        }

        /* 四種字體的 class 定義 */
        body.font-sarabun { font-family: 'Sarabun', sans-serif; }
        body.font-noto { font-family: 'Noto Sans Thai', sans-serif; }
        body.font-mitr { font-family: 'Mitr', sans-serif; }
        body.font-chonburi { font-family: 'Chonburi', sans-serif; }

        /* 按鍵點擊時的動畫效果 */
        .key:active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }

        /* 鍵盤外層容器的過渡效果 */
        #keyboard-wrapper {
            transition: opacity 0.2s ease-in-out;
        }

        /* 新增：禁用鍵盤時的樣式 */
        .keyboard-disabled {
            opacity: 0.6;
            pointer-events: none;
        }
        
        /* 測驗模式回饋的動畫 */
        .feedback-correct {
            animation: flash-green 0.5s ease;
        }
        .feedback-wrong {
            animation: flash-red 0.5s ease;
        }
        @keyframes flash-green {
            0% { background-color: #10B981; }
            100% { background-color: transparent; }
        }
        @keyframes flash-red {
            0% { background-color: #EF4444; }
            100% { background-color: transparent; }
        }
        /* 滑動開關樣式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #f59e0b; /* Amber 500 */
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>

                const example = parts[3] || '';
                const pinyin = parts[4] || '';
                const meaning = parts[5] || '';

                    characterData.set(thai.trim(), {
                        type: subtype.trim(), // 只儲存子類型
                        pinyin: pinyin.trim(),
                        example: example.trim(),
                        meaning: meaning.trim()
                    });

        // --- 功能更新: 發音時禁用鍵盤 ---
        function speak(text, callback) {
            if (isSpeaking || text.trim() === '') {
                if (callback) callback();
                return;
            }
            isSpeaking = true;
            keyboardWrapper.classList.add('keyboard-disabled'); // 禁用鍵盤
            console.log(`[TTS] Requesting audio for: "${text}"`);

            audioElement.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=th-TH&client=tw-ob`;
            
            const playPromise = audioElement.play();

            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.error("Audio playback failed:", error);
                    isSpeaking = false; 
                    keyboardWrapper.classList.remove('keyboard-disabled'); // 播放失敗時啟用鍵盤
                    if (callback) callback();
                });
            }

            const onEnded = () => {
                isSpeaking = false;
                keyboardWrapper.classList.remove('keyboard-disabled'); // 播放結束時啟用鍵盤
                if (callback) callback();
                audioElement.removeEventListener('ended', onEnded);
                audioElement.removeEventListener('error', onError);
            };

            const onError = (e) => {
                console.error("Audio load or playback error:", e);
                isSpeaking = false;
                keyboardWrapper.classList.remove('keyboard-disabled'); // 載入錯誤時啟用鍵盤
                if (callback) callback();
                audioElement.removeEventListener('ended', onEnded);
                audioElement.removeEventListener('error', onError);
            };

            audioElement.addEventListener('ended', onEnded, { once: true });
            audioElement.addEventListener('error', onError, { once: true });
        }

                .filter(key => !key.id.includes('shift') && !key.id.includes('backspace'))
                .map(key => key.textContent.trim())
                .filter(text => text.length === 1 && !'/_+()?,.'.includes(text));
            
            characterPool = keyboardChars.filter(char => characterData.has(char));

            setTimeout(() => {
                speak(testCharacter, () => {
                    testModeFeedback.textContent = '請選擇正確的字母';
                });
            }, 500);
        }

        function showHint() {
            if (!isTestMode || !testCharacter) return;
            updateInfoDisplay(testCharacter, true); // true 代表是提示
            switchTab(infoTab); 
        }

        function showAnswer() {
            if (!isTestMode || !testCharacter) return;
            updateDisplay(testCharacter);
            updateInfoDisplay(testCharacter, false); // false 代表顯示完整資訊
            switchTab(infoTab);
        }

        function toggleTestMode() {
            isTestMode = !isTestMode;
            if (isTestMode) {
                testModeBtn.textContent = '結束測驗';
                testModeBtn.classList.replace('bg-orange-500', 'bg-red-500');
                testModeBtn.classList.replace('hover:bg-orange-600', 'hover:bg-red-600');
                hintBtn.classList.remove('hidden');
                fontTab.btn.disabled = true; // 禁用字體頁籤
                layoutSwitch.disabled = true; // 禁用佈局切換
                updateDisplay('');
                updateInfoDisplay('');
                switchTab(infoTab);
                startNextTestRound();
            } else {
                testModeBtn.textContent = '開始測驗';
                testModeBtn.classList.replace('bg-red-500', 'bg-orange-500');
                testModeBtn.classList.replace('hover:bg-red-600', 'hover:bg-orange-600');
                hintBtn.classList.add('hidden');
                answerBtn.classList.add('hidden');
                fontTab.btn.disabled = false; // 啟用字體頁籤
                layoutSwitch.disabled = false; // 啟用佈局切換
                testModeFeedback.textContent = "點擊下方 '開始測驗' 進入挑戰！";
                testModeFeedback.classList.remove('feedback-correct', 'feedback-wrong');
                testCharacter = '';
            }
        }
        
        // --- 事件處理函數 ---

        function handleKeyPress(e) {
            const keyButton = e.target.closest('.key');
            if (!keyButton) return;

            const keyText = keyButton.textContent.trim();

            if (isTestMode) {
                if (keyText === testCharacter) {
                    wrongAnswerCount = 0;
                    answerBtn.classList.add('hidden');
                    testModeFeedback.textContent = '答對了！準備下一題...';
                    testModeFeedback.classList.add('feedback-correct');
                    updateDisplay(keyText);
                    updateInfoDisplay(keyText, false); 
                    setTimeout(startNextTestRound, 1500); 
                } else {
                    wrongAnswerCount++;
                    testModeFeedback.textContent = '再試一次！';
                    testModeFeedback.classList.add('feedback-wrong');
                    if (wrongAnswerCount >= 3) {
                        answerBtn.classList.remove('hidden');
                    }
                    speak(testCharacter); 
                }
            } else {
                updateDisplay(keyText);
                updateInfoDisplay(keyText, false);
                speak(keyText);
            }
        }
        
        function handleBackspace() {
            if (isSpeaking || isTestMode) return;
            updateDisplay('');
            updateInfoDisplay('');
        }

        // --- 初始設定與綁定事件監聽器 ---
        
        if (!showAnnouncement) {
            announcementBar.classList.add('hidden');
        }

        audioUnlockOverlay.addEventListener('click', unlockAudio);

        infoTab.btn.addEventListener('click', () => switchTab(infoTab));
        fontTab.btn.addEventListener('click', () => switchTab(fontTab));
        hintBtn.addEventListener('click', showHint);
        answerBtn.addEventListener('click', showAnswer);
        
        shiftBtn5Row1.addEventListener('click', () => toggleKeyboardPage('5row'));
        shiftBtn5Row2.addEventListener('click', () => toggleKeyboardPage('5row'));
        backspaceBtn5Row1.addEventListener('click', handleBackspace);
        backspaceBtn5Row2.addEventListener('click', handleBackspace);
        
        shiftBtn4Row1.addEventListener('click', () => toggleKeyboardPage('4row'));
        shiftBtn4Row2.addEventListener('click', () => toggleKeyboardPage('4row'));
        backspaceBtn4Row1.addEventListener('click', handleBackspace);
        backspaceBtn4Row2.addEventListener('click', handleBackspace);

        layoutSwitch.addEventListener('change', (e) => {
            const is4Row = e.target.checked;
            if (is4Row) {
                keyboard5RowContainer.classList.add('hidden');
                keyboard4RowContainer.classList.remove('hidden');
            } else {
                keyboard5RowContainer.classList.remove('hidden');
                keyboard4RowContainer.classList.add('hidden');
            }
        });

        fontSelect.addEventListener('change', changeGlobalFont);
        testModeBtn.addEventListener('click', toggleTestMode);

        allKeys.forEach(key => {
            if (!key.id.includes('shift') && !key.id.includes('backspace')) {
                key.addEventListener('click', handleKeyPress);
            }
        });
    });
    </script>

</body>
</html>
